server:
  addr: ":8080"

app:
  name: "OriginPulse"
  data_dir: "./data"
  log_level: "info"

database:
  url_env: "DATABASE_URL"
  auto_migrate: true
  seed_config_sites: true
  max_conns: 10

auth:
  session_cookie_name: "originpulse_session"
  session_ttl: "168h"
  secure_cookies: false

pantheon:
  machine_token_env: "PANTHEON_MACHINE_TOKEN"
  email_env: "PANTHEON_EMAIL"
  default_envs: ["live"]
  sftp_port: 2222
  dns_timeout: "10s"
  ssh:
    private_key_path_env: "PANTHEON_SSH_KEY_PATH"
    private_key_path: ""
    known_hosts_path: ""

ollama:
  base_url_env: "OLLAMA_BASE_URL"
  base_url: ""
  model_env: "OLLAMA_MODEL"
  model: "gemma4:12b"
  timeout_env: "OLLAMA_TIMEOUT"
  timeout: "10m"

collection:
  enabled: false
  interval: "6m"
  timeout_per_site: "16m"
  server_lock_cooldown: "15m"
  max_parallel_sites: 2
  log_types:
    - "nginx-access"
    - "nginx-error"
    - "apache-access"
    - "apache-error"
    - "php-error"
    - "php-slow"
    - "mysql"
    - "mysql-slow"
  raw_dir: "./data/raw"

combiner:
  combined_dir: "./data/combined"
  quarantine_dir: "./data/quarantine"
  settling_window: "5m"
  finalize_after: "15m"

pipeline:
  index_workers: 3
  max_segments: 500

retention:
  enabled: true
  interval: "24h"
  max_age: "1440h"
  archive_dir: "./data/archives"
  raw_file_max_age: "336h"
  hot_event_max_age: "1440h"
  daily_archive_after: "168h"
  weekly_archive_after: "720h"
  archive_max_age: "2160h"
  report_max_age: "43800h"
  temporary_import_max_age: "168h"
  delete_raw_files: true
  delete_combined_files: false
  delete_hot_events: true
  delete_rollups: false
  delete_temporary_imports: true

reports:
  enabled: true
  interval: "24h"
  ranges: ["24h", "7d", "30d", "90d", "365d"]

notifications:
  enabled: true
  min_severity: "high"
  email:
    enabled: false
    smtp_host: ""
    smtp_port: 587
    username_env: "ORIGINPULSE_SMTP_USERNAME"
    password_env: "ORIGINPULSE_SMTP_PASSWORD"
    from: ""
    to: []
  push:
    enabled: false
    webhook_urls_env: "ORIGINPULSE_PUSH_WEBHOOK_URLS"
    webhook_urls: []
    vapid_public_key_env: "ORIGINPULSE_VAPID_PUBLIC_KEY"
    vapid_private_key_env: "ORIGINPULSE_VAPID_PRIVATE_KEY"
    vapid_subject_env: "ORIGINPULSE_VAPID_SUBJECT"
    vapid_subject: "mailto:originpulse@localhost"

geoip:
  enabled: true
  db_path_env: "GEOIP_DB_PATH"
  db_path: "./data/GeoLite2-City.mmdb"
  seed_path_env: "GEOIP_SEED_PATH"
  seed_path: "./assets/geoip/GeoLite2-City.mmdb"
  account_id_env: "MAXMIND_ACCOUNT_ID"
  license_key_env: "MAXMIND_LICENSE_KEY"
  download_url_env: "MAXMIND_GEOLITE2_CITY_URL"
  download_url: "https://download.maxmind.com/geoip/databases/GeoLite2-City/download?suffix=tar.gz"
  update_interval: "24h"
  download_timeout: "2m"
  last_modified_env: "GEOIP_LAST_MODIFIED_PATH"
  last_modified_path: "./data/GeoLite2-City.lastmod"

ip_intel:
  enabled: true
  interval: "15m"
  range: "24h"
  limit: 500
  startup_backfill: true
  startup_backfill_range: "365d"
  startup_backfill_limit: 5000
  startup_user_agent_limit: 50000

ip_allowlist:
  enabled: true
  entries: []
  # Exact IPs and CIDRs are supported and render as trusted green sources.
  # Example entries:
  # - value: "203.0.113.10"
  #   label: "Corporate VPN"
  #   actor_type: "corporate-vpn"
  #   source: "manual"
  # - value: "198.51.100.0/24"
  #   label: "RAG egress"
  #   actor_type: "rag"
  #   source: "manual"

sites:
  - id: "example-site"
    name: "Example Site"
    source_type: "pantheon"
    pantheon_site_id: "12345678-1234-1234-abcd-0123456789ab"
    enabled: false
    envs: ["live"]
    tags: ["pantheon"]
  - id: "example-apache"
    name: "Example Apache Logs"
    source_type: "local"
    local_path: "./tmp/example.com"
    filename_masks:
      - "example-*"
    enabled: false
    envs: ["live"]
    tags: ["direct", "apache"]
