name: originpulse

services:
  postgres:
    image: postgres:18-alpine
    container_name: originpulse-postgres
    restart: unless-stopped
    shm_size: "1gb"
    command:
      - "postgres"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-8GB}"
      - "-c"
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-15min}"
      - "-c"
      - "checkpoint_completion_target=0.9"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-originpulse}
      POSTGRES_USER: ${POSTGRES_USER:-originpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-originpulse_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  originpulse:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: originpulse:local
    restart: unless-stopped
    command: ["server", "-config", "/app/config.yml"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-originpulse}:${POSTGRES_PASSWORD:-originpulse_dev_password}@postgres:5432/${POSTGRES_DB:-originpulse}?sslmode=disable
      ORIGINPULSE_CONFIG: /app/config.yml
      PANTHEON_EMAIL: ${PANTHEON_EMAIL:-}
      PANTHEON_MACHINE_TOKEN: ${PANTHEON_MACHINE_TOKEN:-}
      PANTHEON_SSH_KEY_PATH: /run/secrets/pantheon_ssh_key
      MAXMIND_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID:-}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:12b}
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-10m}
      ORIGINPULSE_SMTP_USERNAME: ${ORIGINPULSE_SMTP_USERNAME:-}
      ORIGINPULSE_SMTP_PASSWORD: ${ORIGINPULSE_SMTP_PASSWORD:-}
      ORIGINPULSE_PUSH_WEBHOOK_URLS: ${ORIGINPULSE_PUSH_WEBHOOK_URLS:-}
      ORIGINPULSE_VAPID_PUBLIC_KEY: ${ORIGINPULSE_VAPID_PUBLIC_KEY:-}
      ORIGINPULSE_VAPID_PRIVATE_KEY: ${ORIGINPULSE_VAPID_PRIVATE_KEY:-}
      ORIGINPULSE_VAPID_SUBJECT: ${ORIGINPULSE_VAPID_SUBJECT:-mailto:originpulse@localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../config.yml:/app/config.yml:ro
      - ../tmp:/app/tmp:ro
      - originpulse_data:/app/data
    secrets:
      - pantheon_ssh_key
    ports:
      - "${ORIGINPULSE_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "originpulse", "healthcheck", "-url", "http://127.0.0.1:8080/health", "-timeout", "5s"]
      interval: 30s
      timeout: 6s
      retries: 5
      start_period: 20s

secrets:
  pantheon_ssh_key:
    file: ${PANTHEON_SSH_KEY_FILE:?Set PANTHEON_SSH_KEY_FILE to your Pantheon SSH private key path}

volumes:
  postgres_data:
    name: originpulse-postgres
  originpulse_data:
    name: docker_originpulse_data
