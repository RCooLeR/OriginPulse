<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OriginPulse</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#020812">
    <link rel="stylesheet" href="/fontawesome/css/all.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <section id="loginView" class="login-view hidden" aria-label="Login">
      <form id="loginForm" class="login-card">
        <div class="login-logo-wrap">
          <img src="/logo.png" alt="OriginPulse" class="login-logo">
        </div>
        <div>
          <h1>Sign in</h1>
          <p>Monitor logs, traffic, alerts, and IP intelligence from one console.</p>
        </div>
        <label>
          <span>Email</span>
          <input id="emailInput" type="email" autocomplete="email" required>
        </label>
        <label>
          <span>Password</span>
          <input id="passwordInput" type="password" autocomplete="current-password" required>
        </label>
        <p id="loginError" class="form-error" role="alert"></p>
        <button class="button primary" type="submit">Sign in</button>
      </form>
    </section>

    <div id="appShell" class="app-shell hidden">
      <aside class="sidebar" aria-label="Primary navigation">
        <a href="/" class="brand" data-route="overview" aria-label="OriginPulse overview">
          <img src="/logo.png" alt="OriginPulse">
        </a>
        <nav id="primaryNav" class="nav-list"></nav>
        <section class="collector-card">
          <div>
            <span>Collector Status</span>
            <strong id="collectorState">Unknown</strong>
          </div>
          <dl>
            <div><dt>Last Download</dt><dd id="collectorLastDownload">-</dd></div>
          </dl>
          <button id="pipelineButton" class="button outline small" type="button"><i class="fa-solid fa-diagram-project" aria-hidden="true"></i>Run Pipeline</button>
        </section>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="filter-cluster">
            <label class="select-shell">
              <span>Project</span>
              <select id="siteSelect">
                <option value="">All Projects</option>
              </select>
            </label>
            <label class="select-shell compact">
              <span>Range</span>
              <select id="rangeSelect">
                <option value="15m">Last 15 minutes</option>
                <option value="30m">Last 30 minutes</option>
                <option value="1h">Last hour</option>
                <option value="3h">Last 3 hours</option>
                <option value="6h">Last 6 hours</option>
                <option value="24h" selected>Last 24 hours</option>
                <option value="7d">Last 7 days</option>
                <option value="30d">Last 30 days</option>
                <option value="90d">Last 90 days</option>
                <option value="365d">Last year</option>
              </select>
            </label>
            <span class="live-pill"><i></i> LIVE</span>
            <span id="requestActivity" class="request-activity hidden" role="status" aria-live="polite">
              <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
              <span>Loading</span>
            </span>
          </div>
          <div class="top-actions">
            <label class="search-shell">
              <span class="sr-only">Search</span>
              <input id="searchInput" type="search" placeholder="Search logs, IPs, paths, messages...">
            </label>
            <button id="refreshButton" class="icon-button" type="button" aria-label="Refresh" title="Refresh"><i class="fa-solid fa-rotate-right" aria-hidden="true"></i></button>
            <button id="collectButton" class="button primary" type="button"><i class="fa-solid fa-cloud-arrow-down" aria-hidden="true"></i>Collect</button>
            <button id="logoutButton" class="icon-button hidden" type="button" aria-label="Sign out" title="Sign out"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i></button>
            <span id="userBadge" class="avatar">OP</span>
          </div>
        </header>

        <section class="page-head">
          <div>
            <h1 id="pageTitle">Overview</h1>
            <p id="pageSubtitle">Real-time operations across your OriginPulse estate.</p>
          </div>
          <div id="pageActions" class="page-actions"></div>
        </section>

        <div id="toast" class="toast hidden" role="status"></div>
        <section id="content" class="content-grid" aria-live="polite"></section>
      </main>
    </div>

    <aside id="drawer" class="drawer hidden" aria-label="Details">
      <header>
        <div>
          <span id="drawerKicker">Details</span>
          <h2 id="drawerTitle">Details</h2>
        </div>
        <button id="drawerClose" class="icon-button" type="button" aria-label="Close" title="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
      </header>
      <div id="drawerBody" class="drawer-body"></div>
    </aside>

    <section id="modalBackdrop" class="modal-backdrop hidden" data-action="modal-close" aria-hidden="true">
      <article id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header>
          <div>
            <span id="modalKicker">Guide</span>
            <h2 id="modalTitle">Guide</h2>
          </div>
          <button class="icon-button" type="button" data-action="modal-close" aria-label="Close" title="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
        </header>
        <div id="modalBody" class="modal-body"></div>
      </article>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
